<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Viz Flashcards</title>
<style>
  :root {
    --bg: #0a092d;
    --card: #2e3856;
    --card-2: #1a1f3c;
    --accent: #ffcd1f;
    --accent-2: #4255ff;
    --text: #f6f7fb;
    --muted: #a0a7c4;
    --good: #4caf7d;
    --bad: #e25c5c;
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 60px;
  }
  header { width: 100%; max-width: 760px; }
  h1 { font-size: 24px; font-weight: 800; display: flex; align-items: center; gap: 10px; }
  h1 .dot { color: var(--accent); }
  .sub { color: var(--muted); font-size: 14px; margin-top: 4px; }

  .tabs { display: flex; gap: 8px; margin: 22px 0 18px; flex-wrap: wrap; }
  .tab {
    background: var(--card-2); color: var(--muted); border: 1px solid transparent;
    padding: 9px 18px; border-radius: 999px; cursor: pointer; font-size: 14px; font-weight: 600;
    transition: all .15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { background: var(--accent-2); color: #fff; }

  .wrap { width: 100%; max-width: 760px; }

  /* progress */
  .progress { height: 6px; background: var(--card-2); border-radius: 999px; overflow: hidden; margin-bottom: 14px; }
  .progress > div { height: 100%; background: var(--accent); width: 0; transition: width .25s; }
  .counter { color: var(--muted); font-size: 13px; margin-bottom: 14px; display: flex; justify-content: space-between; }

  /* flashcard */
  .scene { perspective: 1600px; }
  .card {
    position: relative; width: 100%; min-height: 340px; cursor: pointer;
    transform-style: preserve-3d; transition: transform .5s;
  }
  .card.flipped { transform: rotateX(180deg); }
  .face {
    position: absolute; inset: 0; backface-visibility: hidden;
    background: var(--card); border-radius: var(--radius);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px; text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,.35);
  }
  .face .label { position: absolute; top: 16px; left: 20px; font-size: 12px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); font-weight: 700; }
  .face .content { font-size: 22px; line-height: 1.5; font-weight: 500; }
  .face.back { transform: rotateX(180deg); }
  .face.back .content { color: var(--accent); }

  .controls { display: flex; align-items: center; justify-content: center; gap: 14px; margin-top: 22px; }
  button.nav {
    background: var(--card-2); color: var(--text); border: 1px solid #3a4366;
    width: 52px; height: 52px; border-radius: 50%; cursor: pointer; font-size: 22px;
    display: flex; align-items: center; justify-content: center; transition: all .15s;
  }
  button.nav:hover { background: var(--card); }
  button.nav:disabled { opacity: .35; cursor: default; }

  .toolbar { display: flex; gap: 10px; justify-content: center; margin-top: 18px; flex-wrap: wrap; }
  .btn {
    background: var(--card-2); color: var(--text); border: 1px solid #3a4366;
    padding: 8px 16px; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 600;
    transition: all .15s; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover { background: var(--card); }
  .btn.file { position: relative; overflow: hidden; }
  .btn.file input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

  /* quiz */
  .quiz-q {
    background: var(--card); border-radius: var(--radius); padding: 32px 28px; margin-bottom: 18px;
    font-size: 20px; line-height: 1.5; min-height: 120px; display: flex; align-items: center;
  }
  .options { display: grid; gap: 12px; }
  .opt {
    background: var(--card-2); border: 2px solid #3a4366; border-radius: 12px;
    padding: 16px 18px; cursor: pointer; font-size: 15px; line-height: 1.4; text-align: left;
    color: var(--text); transition: all .12s;
  }
  .opt:hover { border-color: var(--accent-2); }
  .opt.sel { border-color: var(--accent-2); background: rgba(66,85,255,.18); }
  .opt.sel::before { content: "☑ "; }
  .opt.correct { border-color: var(--good); background: rgba(76,175,125,.15); }
  .opt.miss { border-color: var(--good); background: rgba(76,175,125,.08); border-style: dashed; }
  .opt.wrong { border-color: var(--bad); background: rgba(226,92,92,.15); }
  .opt:disabled { cursor: default; }
  .sata-hint { color: var(--accent); font-size: 13px; font-weight: 600; margin: -6px 0 12px; }

  /* facts page */
  .facts-intro { color: var(--muted); font-size: 14px; line-height: 1.6; margin-bottom: 22px; }
  .facts-sec { margin-bottom: 30px; }
  .facts-sec h3 { font-size: 17px; margin-bottom: 6px; }
  .topic-desc { color: var(--muted); font-size: 14px; line-height: 1.55; margin-bottom: 12px; }
  .fact { background: var(--card-2); border-left: 4px solid var(--muted); border-radius: 8px; padding: 12px 16px; margin-bottom: 10px; line-height: 1.5; font-size: 15px; }
  .fact.t { border-left-color: var(--good); }
  .fact.f { border-left-color: var(--bad); }
  .fact-term { font-weight: 700; margin-bottom: 4px; }
  .fact-def { color: var(--muted); }
  .fact .corr { display: block; margin-top: 6px; color: var(--accent); font-size: 13px; }
  .quiz-foot { margin-top: 18px; display: flex; justify-content: space-between; align-items: center; }
  .score { color: var(--muted); font-size: 14px; }

  /* write mode */
  .write-q {
    background: var(--card); border-radius: var(--radius); padding: 32px 28px; margin-bottom: 18px;
    font-size: 20px; line-height: 1.5; min-height: 110px; display: flex; align-items: center;
  }
  .write-in {
    width: 100%; background: var(--card-2); color: var(--text); border: 2px solid #3a4366;
    border-radius: 12px; padding: 16px 18px; font-size: 16px; font-family: inherit; resize: vertical;
    min-height: 72px; line-height: 1.4;
  }
  .write-in:focus { outline: none; border-color: var(--accent-2); }
  .verdict { border-radius: 12px; padding: 16px 18px; margin-top: 14px; line-height: 1.5; }
  .verdict .tag { font-weight: 800; text-transform: uppercase; letter-spacing: .05em; font-size: 13px; }
  .verdict.ok { background: rgba(76,175,125,.15); border: 1px solid var(--good); }
  .verdict.ok .tag { color: var(--good); }
  .verdict.close { background: rgba(255,205,31,.12); border: 1px solid var(--accent); }
  .verdict.close .tag { color: var(--accent); }
  .verdict.no { background: rgba(226,92,92,.13); border: 1px solid var(--bad); }
  .verdict.no .tag { color: var(--bad); }
  .verdict .ans { margin-top: 8px; }
  .verdict .ans b { color: var(--accent); }
  .verdict .yours { margin-top: 6px; color: var(--muted); font-size: 14px; }
  .explain { background: rgba(255,205,31,.1); border: 1px solid rgba(255,205,31,.45); border-radius: 12px; padding: 16px 18px; margin-top: 14px; line-height: 1.55; }
  .explain .tag { color: var(--accent); font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .05em; display: block; margin-bottom: 8px; }
  .explain b { color: var(--accent); }

  .stage { display: inline-block; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; padding: 4px 12px; border-radius: 999px; background: var(--card-2); color: var(--accent); }
  .breakdown { color: var(--muted); font-size: 13px; margin: -6px 0 16px; display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .breakdown b { color: var(--text); font-weight: 700; }
  .linkbtn { background: none; border: none; color: var(--accent-2); cursor: pointer; font-size: 13px; text-decoration: underline; padding: 0; margin-left: auto; font-family: inherit; }

  .done { text-align: center; padding: 50px 20px; }
  .done h2 { font-size: 28px; margin-bottom: 10px; }
  .done .big { font-size: 46px; font-weight: 800; color: var(--accent); margin: 10px 0; }

  .hint { text-align: center; color: var(--muted); font-size: 12px; margin-top: 16px; }
</style>
</head>

// ---- minimal CSV parser (handles quoted fields, commas, newlines, "" escapes) ----
function parseCSV(text) {
  const rows = [];
  let row = [], field = "", inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i + 1] === '"') { field += '"'; i++; }
        else inQuotes = false;
      } else field += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { row.push(field); field = ""; }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ""; }
      else if (c === '\r') { /* skip */ }
      else field += c;
    }
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  return rows;
}

function toCards(csv) {
  const rows = parseCSV(csv).filter(r => r.length >= 2 && (r[0].trim() || r[1].trim()));
  // drop header row if it looks like one
  if (rows.length && /^term$/i.test(rows[0][0].trim()) && /^definition$/i.test(rows[0][1].trim())) rows.shift();
  return rows.map(r => ({ term: r[0].trim(), definition: r[1].trim() }));
}

function shuffle(a) {
  const arr = a.slice();
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ---- state ----

// ---- QUIZ ----
let quizOrder = [], quizIdx = 0, score = 0, answered = false;
let tokenSets = [];

const STOP = new Set("the a an of to in on for and or is are be it as at by with that this you your they we i if then than into when where which what how why some any all very more most less can will should would could may onto via".split(" "));
function tokenize(s) {
  return new Set(
    String(s).toLowerCase().replace(/[^a-z0-9\s]/g, " ").split(/\s+/)
      .filter(w => w.length > 2 && !STOP.has(w))
  );
}
function jaccard(a, b) {
  if (!a.size || !b.size) return 0;
  let inter = 0;
  a.forEach(w => { if (b.has(w)) inter++; });
  return inter / (a.size + b.size - inter);
}
function isBool(s) { const t = String(s).trim().toLowerCase(); return t === "true" || t === "false"; }

// "true"/"false" verdict even when extra correction text follows (e.g. "False have to be one-to-one")
function boolVerdict(def) {
  const t = String(def).trim().toLowerCase();
  if (/^true\b/.test(t)) return "true";
  if (/^false\b/.test(t)) return "false";
  return null;
}
// the correction text after the leading True/False, if any
function boolCorrection(def) {
  return String(def).trim().replace(/^(true|false)\b[\s:,.\-–—]*/i, "").trim();
}
function cleanTerm(term) {
  return String(term).trim().replace(/[.?\s]+$/, "");
}
function isQuestionTerm(term) {
  return /\?\s*$/.test(String(term).trim());
}
function questionPrompt(card, mode) {
  const term = String(card.term).trim();
  if (isQuestionTerm(term)) return term;

  const cleaned = cleanTerm(term);
  const verdict = boolVerdict(card.definition);
  if (verdict) return `True or false: ${cleaned}`;

  if (/^to visualize\b/i.test(cleaned)) {
    return `In information visualization, which choices are used ${cleaned}?`;
  }
  if (/^visualizing\b/i.test(cleaned)) {
    return `In information visualization, which method is useful for ${cleaned}?`;
  }
  if (/^for\b/i.test(cleaned)) {
    return mode === "write" || mode === "exam-write"
      ? `In information visualization, explain what you would use ${cleaned}.`
      : `In information visualization, which answer best fits ${cleaned}?`;
  }

  return mode === "write" || mode === "exam-write"
    ? `In information visualization, explain what "${cleaned}" means or when it is used.`
    : `In information visualization, which answer best explains "${cleaned}"?`;
}
// If a definition is a short comma-list ("a, b, c"), return its items; else null.
function splitList(def) {
  if (boolVerdict(def)) return null;
  const items = String(def).split(",")
    .map(s => s.replace(/^\s*(and|or)\s+/i, "").trim())
    .filter(Boolean);
  if (items.length < 3) return null;                 // need a real list
  if (items.some(it => it.split(/\s+/).length > 4)) return null; // items must be short noun phrases
  return items;
}

const DIFFICULTY_TOPICS = [
  ["definition adopted", "exploratory", "explanatory", "quality", "numerical", "categorical", "gestalt", "focus", "elimainate"],

  ["amount", "heatmap", "bar", "bars", "pie", "proportion", "stacked", "grouped"],
  ["distribution", "histogram", "density", "boxplot", "box plot", "violin", "strip", "sina", "sinaplot", "ridgeline", "rigeline", "cumulative", "quantile", "jitter"],
  ["quantitative", "scatter", "bubble", "correlation", "correlogram", "association", "relations", "variables"],
  ["time", "series", "line graph", "slope", "pair", "paired"],
  ["dimension", "component", "pca", "geospatial", "map", "choropleth", "cartogram", "projection", "conformal", "longitude", "latitude", "altitude", "parallel set", "mosaic", "treemap"]

function difficultyRank(card) {
  const text = `${card.term} ${card.definition}`.toLowerCase();
  let band = DIFFICULTY_TOPICS.findIndex(keywords => keywords.some(keyword => text.includes(keyword)));
  if (band < 0) band = DIFFICULTY_TOPICS.length;

  let complexity = 0;
  if (boolVerdict(card.definition)) complexity += 1;
  if (splitList(card.definition)) complexity += 2;
  complexity += Math.min(8, tokenize(card.definition).size) / 10;
  if (/dimension|component|pca|projection|cartogram|parallel set|mosaic|treemap/i.test(text)) complexity += 3;
  return band * 100 + complexity;
}

function orderedCardIndexes() {
  return cards
    .map((card, index) => ({ index, rank: difficultyRank(card) }))
    .sort((a, b) => a.rank - b.rank || a.index - b.index)
    .map(item => item.index);
}

function mcq(prompt, answer, distractors) {
  return {
    kind: "mcq",
    prompt,
    answer,
    options: [
      { text: answer, correct: true },
      ...distractors.map(text => ({ text, correct: false }))
    ]
  };
}

function written(prompt, answer) {
  return { kind: "write", prompt, answer };
}

function looseKey(text) {
  return String(text).toLowerCase().replace(/[^a-z0-9\s]/g, " ").replace(/\s+/g, " ").trim();
}

function curatedOptionsForCard(card) {
  if (boolVerdict(card.definition)) return [];
  const term = cleanTerm(card.term).toLowerCase();
  const answerKey = looseKey(card.definition);
  const match = EXAM_BANK.find(item => {
    if (item.kind !== "mcq" || !item.options) return false;
    const prompt = item.prompt.toLowerCase();
    const itemAnswerKey = looseKey(item.answer);
    return (
      (term.length >= 4 && prompt.includes(term)) ||
      itemAnswerKey === answerKey ||
      itemAnswerKey.includes(answerKey) ||
      answerKey.includes(itemAnswerKey)
    );
  });
  return match ? match.options.map(option => ({ ...option })) : [];
}

let listPool = [];   // unique items pooled from every list-style card, for SATA distractors

// Pick distractors: most similar definitions to the correct one, with unique text.
function pickDistractors(ci, n) {
  const correctText = cards[ci].definition.trim();
  const scored = [];
  const seen = new Set([correctText.toLowerCase()]);
  for (let i = 0; i < cards.length; i++) {
    if (i === ci) continue;
    const text = cards[i].definition.trim();
    const key = text.toLowerCase();
    if (seen.has(key)) continue;        // dedupe identical answers (e.g. many "True"/"False")
    seen.add(key);
    scored.push({ i, s: jaccard(tokenSets[ci], tokenSets[i]) });
  }
  scored.sort((a, b) => b.s - a.s);
  // take a pool of the most similar, then randomly pick within it for variety
  const pool = scored.slice(0, Math.max(n + 4, n));
  return shuffle(pool).slice(0, n).map(x => x.i);
}

function buildQuiz() {
  quizOrder = orderedCardIndexes();
  quizIdx = 0; score = 0; answered = false;
  tokenSets = cards.map(c => tokenize(c.definition));
  // pool of unique list items across the deck (for select-all distractors)
  listPool = [];
  const seen = new Set();
  cards.forEach(c => {
    const items = splitList(c.definition);
    if (items) items.forEach(x => { const k = x.toLowerCase(); if (!seen.has(k)) { seen.add(k); listPool.push(x); } });
  });
}
function quizHead() {
  return `
    <div class="progress"><div style="width:${(quizIdx / quizOrder.length) * 100}%"></div></div>
    <div class="counter"><span>Question ${quizIdx + 1} / ${quizOrder.length}</span><span class="score">Score: ${score}</span></div>`;
}
function renderQuiz() {
  if (cards.length < 4) { app.innerHTML = '<p style="color:var(--muted)">Need at least 4 cards for quiz mode.</p>'; return; }
  if (quizIdx >= quizOrder.length) {
    app.innerHTML = `<div class="done"><h2>Done! 🎉</h2><div class="big">${score} / ${quizOrder.length}</div>
      <div class="score">${Math.round((score / quizOrder.length) * 100)}% correct</div>
      <div class="toolbar" style="margin-top:24px"><button class="btn" id="again">↺ Retake</button></div></div>`;
    document.getElementById("again").onclick = () => { buildQuiz(); renderQuiz(); };
    return;
  }
  const ci = quizOrder[quizIdx];
  const correct = cards[ci];
  const items = splitList(correct.definition);

  // Select-all-that-apply for list answers (and enough distractors exist)
  if (items && listPool.length >= items.length + 2) return renderSATA(ci, correct, items);

  // Otherwise single-choice: real True/False, or smart distractors.
  const verdict = boolVerdict(correct.definition);
  const curated = curatedOptionsForCard(correct);
  let opts;
  if (curated.length) {
    opts = shuffle(curated);
  } else if (verdict) {
    opts = shuffle([{ text: "True", correct: verdict === "true" }, { text: "False", correct: verdict === "false" }]);
  } else {
    const distract = pickDistractors(ci, 3);
    opts = shuffle([
      { text: correct.definition, correct: true },
      ...distract.map(i => ({ text: cards[i].definition, correct: false })),
    ]);
  }

  app.innerHTML = quizHead() + `
    <div class="quiz-q">${esc(questionPrompt(correct, "quiz"))}</div>
    <div class="options">
      ${opts.map(o => `<button class="opt" data-c="${o.correct ? 1 : 0}">${esc(o.text)}</button>`).join("")}
    </div>
    <div class="quiz-foot"><span class="score" id="fb"></span><button class="btn" id="skip" style="visibility:hidden">Next ›</button></div>`;
  document.querySelectorAll(".opt").forEach(btn => {
    btn.onclick = () => {
      if (answered) return;
      answered = true;
      const right = btn.dataset.c === "1";
      document.querySelectorAll(".opt").forEach(b => {
        b.disabled = true;
        if (b.dataset.c === "1") b.classList.add("correct");
        else if (b === btn) b.classList.add("wrong");
      });
      if (right) { score++; document.getElementById("fb").textContent = "✅ Correct"; }
      else document.getElementById("fb").textContent = "❌ Answer: " + correct.definition;
      const skip = document.getElementById("skip");
      skip.style.visibility = "visible";
      skip.onclick = () => { quizIdx++; answered = false; renderQuiz(); };
    };
  });
}

function renderSATA(ci, correct, items) {
  const correctSet = new Set(items.map(s => s.toLowerCase()));
  const distract = shuffle(listPool.filter(x => !correctSet.has(x.toLowerCase()))).slice(0, Math.min(5, Math.max(3, items.length)));
  const opts = shuffle([
    ...items.map(t => ({ text: t, correct: true })),
    ...distract.map(t => ({ text: t, correct: false })),
  ]);
  app.innerHTML = quizHead() + `
    <div class="quiz-q">${esc(questionPrompt(correct, "quiz"))}</div>
    <div class="sata-hint">☑ Select ALL that apply (${items.length} correct)</div>
    <div class="options">
      ${opts.map(o => `<button class="opt" data-c="${o.correct ? 1 : 0}">${esc(o.text)}</button>`).join("")}
    </div>
    <div class="quiz-foot"><span class="score" id="fb"></span><button class="btn" id="act">Submit</button></div>`;
  let submitted = false;
  const act = document.getElementById("act");
  document.querySelectorAll(".opt").forEach(btn => btn.onclick = () => {
    if (submitted) return;
    btn.classList.toggle("sel");
  });
  act.onclick = () => {
    if (submitted) { quizIdx++; answered = false; renderQuiz(); return; }
    submitted = true;
    let perfect = true;
    document.querySelectorAll(".opt").forEach(b => {
      const isC = b.dataset.c === "1", isSel = b.classList.contains("sel");
      b.disabled = true; b.classList.remove("sel");
      if (isC && isSel) b.classList.add("correct");
      else if (isC && !isSel) { b.classList.add("miss"); perfect = false; }
      else if (!isC && isSel) { b.classList.add("wrong"); perfect = false; }
    });
    if (perfect) { score++; document.getElementById("fb").textContent = "✅ All correct"; }
    else document.getElementById("fb").textContent = "❌ Solid = correct, dashed = missed, red = wrong";
    act.textContent = "Next ›";
  };
}

let writeOrder = [], writeIdx = 0, writeScore = 0, writeDone = false;
function buildWrite() { writeOrder = orderedCardIndexes(); writeIdx = 0; writeScore = 0; writeDone = false; }

function normalize(s) {
  return String(s).toLowerCase().replace(/[^a-z0-9\s]/g, " ").replace(/\s+/g, " ").trim();
}
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  if (!m) return n; if (!n) return m;
  let prev = Array.from({ length: n + 1 }, (_, i) => i);
  for (let i = 1; i <= m; i++) {
    let cur = [i];
    for (let j = 1; j <= n; j++) {
      const cost = a[i - 1] === b[j - 1] ? 0 : 1;
      cur[j] = Math.min(prev[j] + 1, cur[j - 1] + 1, prev[j - 1] + cost);
    }
    prev = cur;
  }
  return prev[n];
}
function simRatio(a, b) {
  const max = Math.max(a.length, b.length);
  return max ? 1 - levenshtein(a, b) / max : 1;
}
// returns "ok" | "close" | "no"
function grade(userRaw, answerRaw) {
  const u = normalize(userRaw), a = normalize(answerRaw);
  if (!u) return "no";
  if (u === a) return "ok";
  if (simRatio(u, a) >= 0.85) return "ok";                 // typo tolerance
  // keyword coverage for longer answers
  const aWords = [...tokenize(answerRaw)];
  if (aWords.length) {
    const uWords = tokenize(userRaw);
    const hit = aWords.filter(w => uWords.has(w)).length;
    const cov = hit / aWords.length;
    if (cov >= 0.8) return "ok";
    if (cov >= 0.5) return "close";
  }
  return "no";
}

function renderWrite() {
  if (writeIdx >= writeOrder.length) {
    app.innerHTML = `<div class="done"><h2>Done! 🎉</h2><div class="big">${writeScore} / ${writeOrder.length}</div>
      <div class="score">${Math.round((writeScore / writeOrder.length) * 100)}% recalled</div>
      <div class="toolbar" style="margin-top:24px"><button class="btn" id="again">↺ Retake</button></div></div>`;
    document.getElementById("again").onclick = () => { buildWrite(); renderWrite(); };
    return;
  }
  const ci = writeOrder[writeIdx];
  const c = cards[ci];
  app.innerHTML = `
    <div class="progress"><div style="width:${(writeIdx / writeOrder.length) * 100}%"></div></div>
    <div class="counter"><span>${writeIdx + 1} / ${writeOrder.length}</span><span class="score">Score: ${writeScore}</span></div>
    <div class="write-q">${esc(questionPrompt(c, "write"))}</div>
    <textarea class="write-in" id="ans" placeholder="Type the answer, then Enter to check (Shift+Enter for newline)"></textarea>
    <div id="result"></div>
    <div class="quiz-foot"><span></span><button class="btn" id="act">Check</button></div>`;
  tokenSets = cards.map(x => tokenize(x.definition)); // ensure available for keyword grading
  const ta = document.getElementById("ans");
  ta.focus();
  const act = document.getElementById("act");
  let checked = false;

  function reveal() {
    if (checked) return;
    checked = true;
    const verdict = grade(ta.value, c.definition);
    if (verdict === "ok") writeScore++;
    const cls = verdict === "ok" ? "ok" : verdict === "close" ? "close" : "no";
    const tag = verdict === "ok" ? "Correct" : verdict === "close" ? "Close" : "Incorrect";
    ta.disabled = true;
    const overrideBtn = verdict === "ok"
      ? ""
      : `<button class="btn" id="override" style="margin-top:10px">I was actually right →</button>`;
    document.getElementById("result").innerHTML = `
      <div class="verdict ${cls}">
        <span class="tag">${tag}</span>
        <div class="ans">Answer: <b>${esc(c.definition)}</b></div>
        <div class="yours">You wrote: ${esc(ta.value) || "<i>(blank)</i>"}</div>
        ${overrideBtn}
      </div>`;
    const ov = document.getElementById("override");
    if (ov) ov.onclick = () => {
      writeScore++;
      const v = document.querySelector(".verdict");
      v.className = "verdict ok";
      v.querySelector(".tag").textContent = "Correct";
      ov.remove();
      document.querySelector(".counter .score").textContent = "Score: " + writeScore;
    };
    document.querySelector(".counter .score").textContent = "Score: " + writeScore;
    act.textContent = "Next ›";
    act.focus();
  }
  function next() { writeIdx++; renderWrite(); }

  act.onclick = () => { checked ? next() : reveal(); };
  ta.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); checked ? next() : reveal(); }
  });
  // allow Enter on the button after checking
  act.addEventListener("keydown", e => { if (e.key === "Enter" && checked) { e.preventDefault(); next(); } });
}

  try {
    localStorage.setItem(examKey(), JSON.stringify({
      idx: examIdx,
      score: examScore,
      questions: examQuestions
    }));
  } catch (e) {}
}

function loadExamProgress() {
  try {
    const raw = localStorage.getItem(examKey());
    if (!raw) return false;
    const saved = JSON.parse(raw);
    if (!saved || !Array.isArray(saved.questions) || !saved.questions.length) return false;
    examQuestions = saved.questions.map(normalizeSavedExamQuestion);
    examIdx = Math.max(0, Math.min(Number(saved.idx) || 0, examQuestions.length));
    examScore = Number(saved.score) || 0;
    examAnswered = false;
    saveExamProgress();
    return true;
  } catch (e) {
    return false;
  }
}

function resetExamProgress() {
  try { localStorage.removeItem(examKey()); } catch (e) {}
  buildExam();
  renderExam();
}

function confirmResetExamProgress() {
  if (!confirm("Reset Marathon from question 1? This clears your saved Marathon progress.")) return;
  resetExamProgress();
}

function buildExam() {
  tokenSets = cards.map(c => tokenize(c.definition));
  listPool = [];
  const seen = new Set();
  cards.forEach(c => {
    const items = splitList(c.definition);
    if (items) items.forEach(x => {
      const key = x.toLowerCase();
      if (!seen.has(key)) { seen.add(key); listPool.push(x); }
    });
  });

  const curatedQuestions = EXAM_BANK.map((item, position) => ({
    index: -1,
    card: { term: "Marathon item", definition: item.answer },
    kind: item.kind,
    prompt: item.prompt,
    options: item.options ? item.options.slice() : null,
    rank: position,
    points: null,
    response: null
  }));

  const generatedQuestions = orderedCardIndexes().map((ci, position) => {
    const card = cards[ci];
    const canWrite = !boolVerdict(card.definition) && !splitList(card.definition);
    const kind = canWrite && position % 3 === 1 ? "write" : "mcq";
    return {
      index: ci,
      card,
      kind,
      prompt: questionPrompt(card, kind === "write" ? "exam-write" : "quiz"),
      options: null,
      rank: EXAM_BANK.length + position,
      points: null,
      response: null
    };
  });
  examQuestions = curatedQuestions.concat(generatedQuestions);

  if (!examQuestions.some(q => q.kind === "write")) {
    const fallback = examQuestions.find(q => !boolVerdict(q.card.definition) && !splitList(q.card.definition));
    if (fallback) {
      fallback.kind = "write";
      fallback.prompt = questionPrompt(fallback.card, "exam-write");
    }
  }

  examIdx = 0; examScore = 0; examAnswered = false;
  loadExamProgress();
}

function shouldUseExamSelectAll(q) {
  const items = splitList(q.card.definition);
  return !q.options && q.kind === "mcq" && items && listPool.length >= items.length + 2;
}

function recordExamPoints(q, points) {
  const previous = typeof q.points === "number" ? q.points : 0;
  q.points = points;
  examScore += points - previous;
  saveExamProgress();
}

function hasExamAnswer(q) {
  return typeof q.points === "number";
}

function recordExamResponse(q, response) {
  q.response = response;
  saveExamProgress();
}

function currentExamScore() {
  return examScore;
}

function currentExamIndex() {
  return examIdx;
}

function examCanGoBack() {
  return examIdx > 0;
}

function goExamBack() {
  if (examIdx > 0) {
    examIdx--;
    examAnswered = false;
    saveExamProgress();
    renderExam();
  }
}

function goExamForward() {
  if (examIdx < examQuestions.length) {
    examIdx++;
    examAnswered = false;
    saveExamProgress();
    renderExam();
  }
}

function explainQuestion(q) {
  const answer = q.card.definition;
  const prompt = baseReviewPrompt(q);
  return `Correct idea: ${answer} Focus on how this answers "${prompt}" so you can recall it without seeing choices next time.`;
}

function baseReviewPrompt(q) {
  let prompt = String(q.prompt).trim();
  while (/^(Active recall|Again later):\s*/i.test(prompt)) {
    prompt = prompt.replace(/^(Active recall|Again later):\s*/i, "").trim();
  }
  return prompt;
}

function normalizeSavedExamQuestion(q) {
  if (!q || typeof q !== "object") return q;
  if (q.idkReview) {
    const later = /^Again later:/i.test(String(q.prompt));
    q.prompt = `${later ? "Again later" : "Active recall"}: ${baseReviewPrompt(q)}`;
    q.sourcePrompt = baseReviewPrompt({ prompt: q.sourcePrompt || q.prompt });
  }
  if (q.points === undefined) q.points = null;
  if (q.response === undefined) q.response = null;
  return q;
}

function makeIdkReviewQuestion(q, later) {
  const prompt = baseReviewPrompt(q);
  return {
    index: q.index,
    card: q.card,
    kind: "write",
    prompt: `${later ? "Again later" : "Active recall"}: ${prompt}`,
    options: null,
    points: null,
    response: null,
    idkReview: true,
    sourcePrompt: q.prompt
  };
}

const IDK_MAX_TOTAL = 5;   // a card's active-recall FRQ appears at most this many times total
const IDK_MAX_PENDING = 3; // never queue more than this many un-answered copies ahead at once
const IDK_GAP = 3;         // how many questions ahead the recall copy lands

function activeRecallKey(q) {
  return String(q.index) + "::" + q.card.definition;
}

// Count active-recall copies of a card. pendingOnly => only un-answered copies still ahead of us.
function idkCopies(key, pendingOnly) {
  let n = 0;
  const start = pendingOnly ? examIdx + 1 : 0;
  for (let i = start; i < examQuestions.length; i++) {
    const x = examQuestions[i];
    if (x.idkReview && activeRecallKey(x) === key && (!pendingOnly || !hasExamAnswer(x))) n++;
  }
  return n;
}

// Insert a single active-recall FRQ copy a few questions ahead, respecting the caps.
function scheduleIdkReview(q) {
  const key = activeRecallKey(q);
  if (idkCopies(key, false) >= IDK_MAX_TOTAL) return false;   // retired — seen enough times
  if (idkCopies(key, true) >= IDK_MAX_PENDING) return false;  // already queued enough ahead
  const copy = makeIdkReviewQuestion(q, false);
  const at = Math.min(examIdx + IDK_GAP, examQuestions.length);
  examQuestions.splice(at, 0, copy);
  saveExamProgress();
  return true;
}

// Drop every pending un-answered active-recall copy of this card (used by the override).
function clearFutureIdk(q) {
  const key = activeRecallKey(q);
  for (let i = examQuestions.length - 1; i > examIdx; i--) {
    const x = examQuestions[i];
    if (x.idkReview && activeRecallKey(x) === key && !hasExamAnswer(x)) examQuestions.splice(i, 1);
  }
  saveExamProgress();
}

function idkHtml() {
  return `<button class="btn" id="idk">IDK</button>`;
}

function backHtml() {
  return `<button class="btn" id="back" ${examCanGoBack() ? "" : "disabled"}>Back</button>`;
}

function wireBack() {
  const back = document.getElementById("back");
  if (back) back.onclick = goExamBack;
}

function wireIdk(q) {
  const btn = document.getElementById("idk");
  if (!btn) return;
  btn.onclick = () => {
    const panel = document.getElementById("idkpanel");
    if (!panel) return;
    panel.innerHTML = `
      <div class="explain">
        <span class="tag">Read this, then recall it</span>
        <div>${esc(explainQuestion(q))}</div>
        <button class="btn" id="idkdrill" style="margin-top:12px">Drill this now</button>
      </div>`;
    const drill = document.getElementById("idkdrill");
    if (drill) drill.onclick = () => {
      scheduleIdkReview(q);
      finishExamQuestion(0);
    };
  };
}

function examHead(kindLabel) {
  return `
    <div class="progress"><div style="width:${(examIdx / examQuestions.length) * 100}%"></div></div>
    <div class="counter">
      <span>Question ${examIdx + 1} / ${examQuestions.length}</span>
      <span class="score">Marathon score: ${examScore} · ${kindLabel}</span>
    </div>
    <div class="breakdown">
      <span>A-to-Z active recall</span>
      <button class="linkbtn" onclick="confirmResetExamProgress()">Restart from 0</button>
    </div>`;
}

function finishExamQuestion(points) {
  recordExamPoints(examQuestions[examIdx], points);
  goExamForward();
}

function renderExam() {
  if (cards.length < 4) { app.innerHTML = '<p style="color:var(--muted)">Need at least 4 cards for Marathon mode.</p>'; return; }
  if (examIdx >= examQuestions.length) {
    app.innerHTML = `<div class="done"><h2>Marathon complete</h2><div class="big">${examScore} / ${examQuestions.length}</div>
      <div class="score">${Math.round((examScore / examQuestions.length) * 100)}% correct</div>
      <div class="toolbar" style="margin-top:24px"><button class="btn" id="again">↺ Restart Marathon</button></div></div>`;
    document.getElementById("again").onclick = resetExamProgress;
    return;
  }

  const q = examQuestions[examIdx];
  if (q.kind === "write") return renderExamWrite(q);
  if (shouldUseExamSelectAll(q)) return renderExamSATA(q, splitList(q.card.definition));
  renderExamMCQ(q);
}

function renderExamMCQ(q) {
  const card = q.card;
  const verdict = boolVerdict(card.definition);
  let opts;
  if (q.options) {
    opts = shuffle(q.options);
  } else if (verdict) {
    opts = shuffle([{ text: "True", correct: verdict === "true" }, { text: "False", correct: verdict === "false" }]);
  } else {
    const distract = pickDistractors(q.index, 3);
    opts = shuffle([
      { text: card.definition, correct: true },
      ...distract.map(i => ({ text: cards[i].definition, correct: false })),
    ]);
  }

  const canAdvance = hasExamAnswer(q);
  app.innerHTML = examHead("Multiple choice") + `
    <div class="quiz-q">${esc(q.prompt)}</div>
    <div class="options">${opts.map(o => {
      const wasSelected = q.response && q.response.selected === o.text;
      const classes = [
        "opt",
        canAdvance && o.correct ? "correct" : "",
        canAdvance && wasSelected && !o.correct ? "wrong" : ""
      ].filter(Boolean).join(" ");
      return `<button class="${classes}" data-c="${o.correct ? 1 : 0}" data-text="${esc(o.text)}" ${canAdvance ? "disabled" : ""}>${esc(o.text)}</button>`;
    }).join("")}</div>
    <div class="quiz-foot"><span class="score" id="fb"></span><div class="toolbar" style="margin:0">${backHtml()}<button class="btn" id="next" style="visibility:${canAdvance ? "visible" : "hidden"}">Next ›</button>${idkHtml()}</div></div>
    <div id="idkpanel"></div>`;
  wireBack();
  wireIdk(q);
  if (canAdvance) document.getElementById("fb").textContent = q.response && q.response.right ? "Correct" : "Answer: " + card.definition;
  const next = document.getElementById("next");
  if (next) next.onclick = goExamForward;
  document.querySelectorAll(".opt").forEach(btn => {
    btn.onclick = () => {
      if (examAnswered) return;
      examAnswered = true;
      const right = btn.dataset.c === "1";
      recordExamResponse(q, { type: "mcq", selected: btn.dataset.text, right });
      document.querySelectorAll(".opt").forEach(b => {
        b.disabled = true;
        if (b.dataset.c === "1") b.classList.add("correct");
        else if (b === btn) b.classList.add("wrong");
      });
      document.getElementById("fb").textContent = right ? "Correct" : "Answer: " + card.definition;
      next.style.visibility = "visible";
      next.onclick = () => finishExamQuestion(right ? 1 : 0);
    };
  });
}

function renderExamSATA(q, items) {
  const correctSet = new Set(items.map(s => s.toLowerCase()));
  const distract = shuffle(listPool.filter(x => !correctSet.has(x.toLowerCase()))).slice(0, Math.min(5, Math.max(3, items.length)));
  const opts = shuffle([
    ...items.map(t => ({ text: t, correct: true })),
    ...distract.map(t => ({ text: t, correct: false })),
  ]);
  const canAdvance = hasExamAnswer(q);
  app.innerHTML = examHead("Select all") + `
    <div class="quiz-q">${esc(q.prompt)}</div>
    <div class="sata-hint">Select ALL that apply (${items.length} correct)</div>
    <div class="options">${opts.map(o => {
      const selected = q.response && q.response.selected && q.response.selected.includes(o.text);
      const classes = [
        "opt",
        canAdvance && o.correct && selected ? "correct" : "",
        canAdvance && o.correct && !selected ? "miss" : "",
        canAdvance && !o.correct && selected ? "wrong" : "",
        !canAdvance && selected ? "sel" : ""
      ].filter(Boolean).join(" ");
      return `<button class="${classes}" data-c="${o.correct ? 1 : 0}" data-text="${esc(o.text)}" ${canAdvance ? "disabled" : ""}>${esc(o.text)}</button>`;
    }).join("")}</div>
    <div class="quiz-foot"><span class="score" id="fb"></span><div class="toolbar" style="margin:0">${backHtml()}<button class="btn" id="act">${canAdvance ? "Next ›" : "Submit"}</button>${idkHtml()}</div></div>
    <div id="idkpanel"></div>`;
  wireBack();
  wireIdk(q);
  let submitted = false;
  const act = document.getElementById("act");
  if (canAdvance) document.getElementById("fb").textContent = q.response && q.response.perfect ? "All correct" : "Solid = correct, dashed = missed, red = wrong";
  document.querySelectorAll(".opt").forEach(btn => btn.onclick = () => {
    if (submitted) return;
    btn.classList.toggle("sel");
  });
  act.onclick = () => {
    if (canAdvance && !submitted) return goExamForward();
    if (submitted) return finishExamQuestion(document.getElementById("fb").dataset.points === "1" ? 1 : 0);
    submitted = true;
    let perfect = true;
    const selected = [];
    document.querySelectorAll(".opt").forEach(b => {
      const isC = b.dataset.c === "1", isSel = b.classList.contains("sel");
      if (isSel) selected.push(b.dataset.text);
      b.disabled = true; b.classList.remove("sel");
      if (isC && isSel) b.classList.add("correct");
      else if (isC && !isSel) { b.classList.add("miss"); perfect = false; }
      else if (!isC && isSel) { b.classList.add("wrong"); perfect = false; }
    });
    const fb = document.getElementById("fb");
    fb.textContent = perfect ? "All correct" : "Solid = correct, dashed = missed, red = wrong";
    fb.dataset.points = perfect ? "1" : "0";
    recordExamResponse(q, { type: "sata", selected, perfect });
    act.textContent = "Next ›";
  };
}

function renderExamWrite(q) {
  const card = q.card;
  const canAdvance = hasExamAnswer(q);
  app.innerHTML = examHead("Written") + `
    <div class="write-q">${esc(q.prompt)}</div>
    <textarea class="write-in" id="ans" placeholder="Type the answer, then Enter to check (Shift+Enter for newline)" ${canAdvance ? "disabled" : ""}>${esc(q.response && q.response.answer ? q.response.answer : "")}</textarea>
    <div id="result">${canAdvance && q.response ? `
      <div class="verdict ${q.response.verdict === "ok" ? "ok" : q.response.verdict === "close" ? "close" : "no"}">
        <span class="tag">${q.response.verdict === "ok" ? "Correct" : q.response.verdict === "close" ? "Close" : "Incorrect"}</span>
        <div class="ans">Answer: <b>${esc(card.definition)}</b></div>
        <div class="yours">You wrote: ${esc(q.response.answer) || "<i>(blank)</i>"}</div>
      </div>` : ""}</div>
    <div class="quiz-foot"><span></span><div class="toolbar" style="margin:0">${backHtml()}<button class="btn" id="act">${canAdvance ? "Next ›" : "Check"}</button>${idkHtml()}</div></div>
    <div id="idkpanel"></div>`;
  wireBack();
  wireIdk(q);
  const ta = document.getElementById("ans"); ta.focus();
  const act = document.getElementById("act");
  let checked = false, points = 0, verdictResult = null, overridden = false;
  // Schedule the next recall copy only when the user actually moves on from a missed FRQ.
  function moveOn() {
    if (q.idkReview && !overridden && verdictResult !== "ok") scheduleIdkReview(q);
    finishExamQuestion(points);
  }
  function reveal() {
    if (checked) return;
    checked = true;
    const verdict = grade(ta.value, card.definition);
    verdictResult = verdict;
    points = verdict === "ok" ? 1 : 0;
    recordExamResponse(q, { type: "write", answer: ta.value, verdict });
    const comingBack = q.idkReview && verdict !== "ok";
    const cls = verdict === "ok" ? "ok" : verdict === "close" ? "close" : "no";
    const tag = verdict === "ok" ? "Correct" : verdict === "close" ? (comingBack ? "Close — coming back soon" : "Close") : (comingBack ? "Incorrect — coming back soon" : "Incorrect");
    ta.disabled = true;
    const overrideBtn = verdict === "ok" ? "" : `<button class="btn" id="override" style="margin-top:10px">I was actually right →</button>`;
    document.getElementById("result").innerHTML = `
      <div class="verdict ${cls}">
        <span class="tag">${tag}</span>
        <div class="ans">Answer: <b>${esc(card.definition)}</b></div>
        <div class="yours">You wrote: ${esc(ta.value) || "<i>(blank)</i>"}</div>
        ${overrideBtn}
      </div>`;
    const ov = document.getElementById("override");
    if (ov) ov.onclick = () => {
      points = 1;
      overridden = true;
      verdictResult = "ok";
      recordExamResponse(q, { type: "write", answer: ta.value, verdict: "ok" });
      if (q.idkReview) clearFutureIdk(q);   // got it right after all — drop the pending recalls
      const v = document.querySelector(".verdict");
      v.className = "verdict ok";
      v.querySelector(".tag").textContent = "Correct";
      ov.remove();
    };
    act.textContent = "Next ›"; act.focus();
  }
  act.onclick = () => { canAdvance && !checked ? goExamForward() : checked ? moveOn() : reveal(); };
  ta.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); checked ? moveOn() : reveal(); }
  });
}

function esc(s) { return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c])); }

function loadFile(e) {
  const f = e.target.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = () => {
    const newCards = toCards(reader.result);
    if (!newCards.length) { alert("No valid rows found in that CSV."); return; }
    cards = newCards;
    order = cards.map((_, i) => i);
    idx = 0; flipped = false;
    document.getElementById("deckinfo").textContent = cards.length + " cards loaded (" + f.name + ")";
    render();
  };
  reader.readAsText(f);
}

// ---- LEARN (adaptive: flashcard -> MCQ -> written -> mastered) ----
let learnLevels = [], learnQueue = [];

function deckKey() {
  const s = cards.map(c => c.term + "|" + c.definition).join("~");
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0;
  return "vizflash_learn_" + cards.length + "_" + h;
}
function loadLevels() {
  try {
    const raw = localStorage.getItem(deckKey());
    if (raw) { const arr = JSON.parse(raw); if (Array.isArray(arr) && arr.length === cards.length) return arr; }
  } catch (e) {}
  return null;
}
function saveLevels() { try { localStorage.setItem(deckKey(), JSON.stringify(learnLevels)); } catch (e) {} }
function resetLearnProgress() {
  if (!confirm("Reset all Learn progress for this deck?")) return;
  try { localStorage.removeItem(deckKey()); } catch (e) {}
  buildLearn(); renderLearn();
}

function buildLearn() {
  learnLevels = loadLevels() || cards.map(() => 0);   // resume saved progress if present
  learnQueue = shuffle(learnLevels.map((l, i) => l < 3 ? i : -1).filter(i => i >= 0));
  tokenSets = cards.map(c => tokenize(c.definition));
}
function learnNext(ci, newLevel) {
  learnLevels[ci] = newLevel;
  saveLevels();
  if (newLevel < 3) learnQueue.push(ci);   // re-queue unless mastered
  renderLearn();
}
function renderLearn() {
  const total = cards.length;
  if (total < 4) { app.innerHTML = '<p style="color:var(--muted)">Need at least 4 cards for Learn mode.</p>'; return; }

  const counts = [0, 0, 0, 0];
  learnLevels.forEach(l => counts[Math.min(l, 3)]++);
  const done = counts[3];
  const stillLearning = total - done;

  if (done >= total) {
    app.innerHTML = `<div class="done"><h2>Mastered all ${total}! 🎉</h2><div class="big">100%</div>
      <div class="toolbar" style="margin-top:24px"><button class="btn" id="again">↺ Start over</button></div></div>`;
    document.getElementById("again").onclick = () => {
      try { localStorage.removeItem(deckKey()); } catch (e) {}
      buildLearn(); renderLearn();
    };
    return;
  }
  let ci = null;
  while (learnQueue.length) { const c = learnQueue.shift(); if (learnLevels[c] < 3) { ci = c; break; } }
  if (ci === null) { learnQueue = shuffle(learnLevels.map((l, i) => l < 3 ? i : -1).filter(i => i >= 0)); ci = learnQueue.shift(); }
  const card = cards[ci];
  const level = learnLevels[ci];
  const stageLabel = level === 0 ? "📖 Flashcard" : level === 1 ? "✅ Multiple choice" : "✍️ Written";
  const head = `
    <div class="progress"><div style="width:${(done / total) * 100}%"></div></div>
    <div class="counter"><span>Mastered <b>${done}</b> / ${total}</span><span class="stage">${stageLabel}</span></div>
    <div class="breakdown">
      <span>Still learning: <b>${stillLearning}</b></span>
      <span>📖 ${counts[0]}</span><span>✅ ${counts[1]}</span><span>✍️ ${counts[2]}</span><span>✓ ${counts[3]}</span>
      <button class="linkbtn" onclick="resetLearnProgress()">reset progress</button>
    </div>`;

  // ---- Level 0: flashcard (click only flips, never progresses) ----
  if (level === 0) {
    app.innerHTML = head + `
      <div class="scene"><div class="card" id="lcard">
        <div class="face front"><div class="label">Term</div><div class="content">${esc(card.term)}</div></div>
        <div class="face back"><div class="label">Definition</div><div class="content">${esc(card.definition)}</div></div>
      </div></div>
      <div class="toolbar">
        <button class="btn" id="dunno">↺ Still learning</button>
        <button class="btn" id="know" style="background:var(--accent-2);color:#fff;border-color:var(--accent-2)">Got it ✓</button>
      </div>
      <div class="hint">Click the card to flip back and forth · use the buttons to grade yourself</div>`;
    const lcard = document.getElementById("lcard");
    lcard.onclick = () => lcard.classList.toggle("flipped");  // smooth flip, no re-render, no progression
    document.getElementById("dunno").onclick = () => learnNext(ci, 0); // stays flashcard
    document.getElementById("know").onclick = () => learnNext(ci, 1);  // -> MCQ
    return;
  }

  // ---- Level 1: multiple choice ----
  if (level === 1) {
    let opts;
    const curated = curatedOptionsForCard(card);
    if (curated.length) {
      opts = shuffle(curated);
    } else if (isBool(card.definition)) {
      opts = shuffle([{ text: "True", correct: /true/i.test(card.definition) },
                      { text: "False", correct: /false/i.test(card.definition) }]);
    } else {
      const d = pickDistractors(ci, 3);
      opts = shuffle([{ text: card.definition, correct: true },
                      ...d.map(i => ({ text: cards[i].definition, correct: false }))]);
    }
    app.innerHTML = head + `
      <div class="quiz-q">${esc(questionPrompt(card, "quiz"))}</div>
      <div class="options">${opts.map(o => `<button class="opt" data-c="${o.correct ? 1 : 0}">${esc(o.text)}</button>`).join("")}</div>
      <div class="quiz-foot"><span class="score" id="fb"></span><button class="btn" id="nx" style="visibility:hidden">Next ›</button></div>`;
    let ansd = false;
    document.querySelectorAll(".opt").forEach(btn => btn.onclick = () => {
      if (ansd) return; ansd = true;
      const right = btn.dataset.c === "1";
      document.querySelectorAll(".opt").forEach(b => {
        b.disabled = true;
        if (b.dataset.c === "1") b.classList.add("correct");
        else if (b === btn) b.classList.add("wrong");
      });
      document.getElementById("fb").textContent = right ? "✅ Correct" : "❌ Answer: " + card.definition;
      const nx = document.getElementById("nx"); nx.style.visibility = "visible";
      nx.onclick = () => learnNext(ci, right ? 2 : 0); // right -> written, wrong -> back to flashcard
    });
    return;
  }

  // ---- Level 2: written ----
  app.innerHTML = head + `
    <div class="write-q">${esc(questionPrompt(card, "write"))}</div>
    <textarea class="write-in" id="ans" placeholder="Type the answer, then Enter to check (Shift+Enter for newline)"></textarea>
    <div id="result"></div>
    <div class="quiz-foot"><span></span><button class="btn" id="act">Check</button></div>`;
  const ta = document.getElementById("ans"); ta.focus();
  const act = document.getElementById("act");
  let checked = false, resultLevel = 1;
  function reveal() {
    if (checked) return; checked = true;
    const v = grade(ta.value, card.definition);
    resultLevel = v === "ok" ? 3 : v === "close" ? 2 : 1;  // ok->mastered, close->retry written, no->MCQ
    const cls = v === "ok" ? "ok" : v === "close" ? "close" : "no";
    const tag = v === "ok" ? "Correct — mastered" : v === "close" ? "Close — stays at written" : "Incorrect — back to MCQ";
    ta.disabled = true;
    const ovBtn = v === "ok" ? "" : `<button class="btn" id="override" style="margin-top:10px">I was actually right →</button>`;
    document.getElementById("result").innerHTML = `
      <div class="verdict ${cls}"><span class="tag">${tag}</span>
        <div class="ans">Answer: <b>${esc(card.definition)}</b></div>
        <div class="yours">You wrote: ${esc(ta.value) || "<i>(blank)</i>"}</div>
        ${ovBtn}</div>`;
    const ov = document.getElementById("override");
    if (ov) ov.onclick = () => {
      resultLevel = 3;
      const vd = document.querySelector(".verdict");
      vd.className = "verdict ok";
      vd.querySelector(".tag").textContent = "Correct — mastered";
      ov.remove();
    };
    act.textContent = "Next ›"; act.focus();
  }
  act.onclick = () => { checked ? learnNext(ci, resultLevel) : reveal(); };
  ta.addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); checked ? learnNext(ci, resultLevel) : reveal(); } });
  act.addEventListener("keydown", e => { if (e.key === "Enter" && checked) { e.preventDefault(); learnNext(ci, resultLevel); } });
}

// ---- FACTS (organized study reference sheet) ----
const FACT_TOPICS = [
  {
    title: "Visualization Goals and Data Types",
    desc: "Start here: these facts explain what visualization is for, how analysis changes with the audience, and the major kinds of data you may need to show.",
    keywords: ["definition adopted", "exploratory", "explanatory", "quality", "numerical", "categorical", "elimainate", "focus"]
  },
  {
    title: "Scales, Coordinates, and Color",
    desc: "These concepts control how data turns into marks on the screen. They affect position, shape, color, distortion, and whether the audience reads the values correctly.",
    keywords: ["scale", "scales", "coordinate", "cartesian", "polar", "axis", "axes", "log", "square-root", "color", "colors", "projection", "projections", "conformal", "longitude", "latitude", "altitude"]
  },
  {
    title: "Amounts and Proportions",
    desc: "Use this group when deciding how to compare sizes, totals, parts of a whole, or nested categories.",
    keywords: ["amount", "heatmap", "bar", "bars", "pie", "proportion", "proportions", "stacked", "grouped", "mosaic", "treemap", "parallel set", "nested"]
  },
  {
    title: "Distributions",
    desc: "Distribution charts show the shape, spread, and frequency of measurements. The key choice is whether you need a simple public-facing summary or a more faithful view of the data.",
    keywords: ["distribution", "histogram", "density", "densities", "boxplot", "box plot", "violin", "strip", "sina", "sinaplot", "ridgeline", "rigeline", "cumulative", "quantile", "jitter", "overplotting"]
  },
  {
    title: "Relationships, Associations, and Dimensionality",
    desc: "These facts are about comparing variables with each other, spotting association, and handling datasets with many measurements at once.",
    keywords: ["quantitative", "scatter", "bubble", "correlation", "correlogram", "dimension", "component", "pca", "association", "relations", "variables"]
  },
  {
    title: "Time, Paired, and Geospatial Data",
    desc: "These chart types depend on structure: time has order, paired data compares related measurements, and maps must deal with location and projection distortion.",
    keywords: ["time", "series", "line graph", "slope", "pair", "paired", "x = y", "geospatial", "map", "choropleth", "cartogram"]
  }
];

function factText(c) {
  const verdict = boolVerdict(c.definition);
  if (!verdict) return c.definition;
  const corr = boolCorrection(c.definition);
  if (verdict === "true") return "True.";
  return corr ? `False. Correction: ${corr}` : "False.";
}

function factKind(c) {
  const verdict = boolVerdict(c.definition);
  if (verdict === "true") return "t";
  if (verdict === "false") return "f";
  return "";
}

function matchesTopic(card, topic) {
  const text = `${card.term} ${card.definition}`.toLowerCase();
  return topic.keywords.some(keyword => text.includes(keyword));
}

function groupedFacts() {
  const used = new Set();
  const groups = FACT_TOPICS.map(topic => {
    const items = cards
      .map((card, index) => ({ card, index }))
      .filter(item => !used.has(item.index) && matchesTopic(item.card, topic));
    items.forEach(item => used.add(item.index));
    return { ...topic, items };
  }).filter(group => group.items.length);

  const remaining = cards
    .map((card, index) => ({ card, index }))
    .filter(item => !used.has(item.index));
  if (remaining.length) {
    groups.push({
      title: "Other Key Facts",
      desc: "These remaining cards are still useful, but they do not fit cleanly into one of the larger subject groups above.",
      items: remaining
    });
  }
  return groups;
}

function renderFacts() {
  if (!cards.length) { app.innerHTML = '<p style="color:var(--muted)">No facts in this deck.</p>'; return; }
  const groups = groupedFacts();
  const factHtml = ({ card }) => {
    const kind = factKind(card);
    return `
      <div class="fact ${kind}">
        <div class="fact-term">${esc(card.term)}</div>
        <div class="fact-def">${esc(factText(card))}</div>
      </div>`;
  };
  app.innerHTML = `
    <div class="facts-intro">
      Know these before you drill. The deck is organized by subject so related ideas sit together.
      Green marks are true statements, and red marks are false statements with the correction written underneath.
    </div>
    ${groups.map(group => `
      <div class="facts-sec">
        <h3>${esc(group.title)}</h3>
        <p class="topic-desc">${esc(group.desc)}</p>
        ${group.items.map(factHtml).join("")}
      </div>`).join("")}`;
}

function render() {
  if (mode === "cards") return renderCards();
  if (mode === "learn") { buildLearn(); return renderLearn(); }
  if (mode === "write") { buildWrite(); return renderWrite(); }
  if (mode === "marathon") { buildExam(); return renderExam(); }
  if (mode === "facts") return renderFacts();
  buildQuiz(); renderQuiz();
}

// tabs
document.querySelectorAll(".tab").forEach(t => {
  t.onclick = () => {
    document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
    t.classList.add("active");
    mode = t.dataset.mode;
    render();
  };
});

// keyboard (flashcards)
document.addEventListener("keydown", e => {
  if (mode !== "cards") return;
  if (e.code === "Space") { e.preventDefault(); flipped = !flipped; renderCards(); }
  else if (e.code === "ArrowRight" && idx < cards.length - 1) { idx++; flipped = false; renderCards(); }
  else if (e.code === "ArrowLeft" && idx > 0) { idx--; flipped = false; renderCards(); }
  else if (e.key.toLowerCase() === "s") { order = shuffle(order); idx = 0; flipped = false; renderCards(); }
});

render();
</script>
